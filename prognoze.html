<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <title>Prognoze</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
  <button onclick="location.href='index.html'">POČETAK</button>
  <button onclick="location.href='timovi.html'">TIMOVI</button>
  <button onclick="location.href='tabela.html'">TABELA</button>
  <button onclick="location.href='utakmice.html'">UTAKMICE</button>
  <button onclick="location.href='prognoze.html'">PROGNOZE</button>
</nav>

<div class="content">

  <h1>⚽ Prognoze Utakmica</h1>

  <!-- UTAKMICA 1 -->
  <div class="prediction-box">

    <h2>FK Bernabeu vs FK Sutjeska</h2>

    <input type="number" id="a1" placeholder="1">
    <input type="number" id="b1" placeholder="2">

  </div>

  <!-- UTAKMICA 2 -->
  <div class="prediction-box">

    <h2>FK NewYork vs FK Barcelona</h2>

    <input type="number" id="a2" placeholder="1">
    <input type="number" id="b2" placeholder="2">

  </div>

  <br>

  <button onclick="savePredictions()">
    SAČUVAJ PROGNOZE
  </button>

  <p id="saved"></p>

</div>

<script>

function savePredictions() {

  const predictions = {

    game1: {
      a: document.getElementById("a1").value,
      b: document.getElementById("b1").value
    },

    game2: {
      a: document.getElementById("a2").value,
      b: document.getElementById("b2").value
    }

  };

  localStorage.setItem(
    "footballPredictions",
    JSON.stringify(predictions)
  );

  document.getElementById("saved").innerHTML =
    "✅ Prognoze sačuvane!";
}

function loadPredictions() {

  const data =
    JSON.parse(localStorage.getItem("footballPredictions"));

  if(data) {

    document.getElementById("a1").value = data.game1.a;
    document.getElementById("b1").value = data.game1.b;

    document.getElementById("a2").value = data.game2.a;
    document.getElementById("b2").value = data.game2.b;

  }
}

loadPredictions();

</script>

</body>
</html>
