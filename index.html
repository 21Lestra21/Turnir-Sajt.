<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <title>Fudbalski Turnir</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">

  <div class="login-box">

    <h1>⚽ Fudbalski Turnir</h1>

    <input type="text"
           id="username"
           placeholder="Unesi username">

    <br><br>

    <button onclick="login()">
      UĐI NA SAJT
    </button>

  </div>

</div>

<!-- GLAVNI SAJT -->
<div id="mainSite" style="display:none;">

  <nav class="navbar">
    <button onclick="location.href='index.html'">POČETAK</button>
    <button onclick="location.href='timovi.html'">TIMOVI</button>
    <button onclick="location.href='tabela.html'">TABELA</button>
    <button onclick="location.href='utakmice.html'">UTAKMICE</button>
    <button onclick="location.href='prognoze.html'">PROGNOZE</button>
  </nav>

  <div class="content">

    <h1>⚽ Dobrodošao</h1>

    <h2 id="welcomeUser"></h2>

  </div>

</div>

<script>

function login() {

  const username =
    document.getElementById("username").value;

  if(username.trim() === "") {
    alert("Unesi username!");
    return;
  }

  localStorage.setItem("footballUser", username);

  showSite();
}

function showSite() {

  const user =
    localStorage.getItem("footballUser");

  if(user) {

    document.getElementById("loginScreen").style.display = "none";

    document.getElementById("mainSite").style.display = "block";

    document.getElementById("welcomeUser").innerHTML =
      "👋 " + user;

  }

}

showSite();

</script>

</body>
</html>
